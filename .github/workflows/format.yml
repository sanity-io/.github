name: Prettier

on:
  workflow_call:
    secrets:
      ECOSPARK_APP_ID:
        required: true
      ECOSPARK_APP_PRIVATE_KEY:
        required: true

concurrency:
  group: ${{ github.repository_owner_id }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    if: github.repository_owner == 'sanity-io'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/setup@v1
        with:
          cache: true
          runtime: node@lts
      - run: pnpm format
      - run: git restore .github/workflows pnpm-lock.yaml
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.ECOSPARK_APP_ID }}
          private-key: ${{ secrets.ECOSPARK_APP_PRIVATE_KEY }}
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          body: I ran `pnpm format` 🧑‍💻
          branch: actions/format-${{ github.ref_name }}
          commit-message: "chore(format): 🤖 ✨"
          delete-branch: true
          labels: 🤖 bot
          sign-commits: true
          title: "chore(format): 🤖 ✨"
          token: ${{ steps.app-token.outputs.token }}
